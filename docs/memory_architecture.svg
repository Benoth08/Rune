<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1420"/>
      <stop offset="1" stop-color="#0b0f18"/>
    </linearGradient>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6b82"/>
    </marker>
    <marker id="a2p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8f5fd0"/>
    </marker>
    <filter id="soft2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1000" height="660" fill="url(#bg2)"/>

  <text x="500" y="46" text-anchor="middle" fill="#e8edf4" font-size="27" font-weight="700">Architecture mémoire multi-étages</text>
  <text x="500" y="72" text-anchor="middle" fill="#7b8aa0" font-size="14">Quatre étages complémentaires + un cycle de vie sur la mémoire sémantique</text>

  <!-- Input -->
  <g filter="url(#soft2)">
    <rect x="410" y="100" width="180" height="52" rx="12" fill="#161b28" stroke="#3d4a66" stroke-width="1.4"/>
  </g>
  <text x="500" y="132" text-anchor="middle" fill="#cdd8e8" font-size="15" font-weight="600">Message → latents</text>

  <!-- Salience gate -->
  <g filter="url(#soft2)">
    <rect x="388" y="184" width="224" height="52" rx="12" fill="#2e2410" stroke="#e0a53f" stroke-width="1.5"/>
  </g>
  <text x="500" y="209" text-anchor="middle" fill="#f2c877" font-size="14" font-weight="700">Filtre de salience (N1·N2·N3)</text>
  <text x="500" y="226" text-anchor="middle" fill="#cfae7a" font-size="11">anti-bruit — décide ce qui mérite d'être encodé</text>

  <!-- 4 memory stages -->
  <!-- MHN -->
  <g filter="url(#soft2)">
    <rect x="60" y="300" width="200" height="120" rx="14" fill="#0d1f38" stroke="#3f7fd0" stroke-width="1.6"/>
  </g>
  <text x="160" y="330" text-anchor="middle" fill="#77a8ec" font-size="17" font-weight="700">MHN</text>
  <text x="160" y="352" text-anchor="middle" fill="#a9c2e6" font-size="12">Modern Hopfield Net</text>
  <text x="160" y="374" text-anchor="middle" fill="#8095b2" font-size="11.5">épisodique associatif</text>
  <text x="160" y="392" text-anchor="middle" fill="#8095b2" font-size="11.5">rappel par énergie</text>
  <text x="160" y="410" text-anchor="middle" fill="#6b7f9e" font-size="10.5">temporaire, capacité bornée</text>

  <!-- KG -->
  <g filter="url(#soft2)">
    <rect x="290" y="300" width="200" height="120" rx="14" fill="#0e2617" stroke="#2fae5f" stroke-width="1.6"/>
  </g>
  <text x="390" y="330" text-anchor="middle" fill="#5fd68a" font-size="17" font-weight="700">KG</text>
  <text x="390" y="352" text-anchor="middle" fill="#a6dbbb" font-size="12">Knowledge Graph</text>
  <text x="390" y="374" text-anchor="middle" fill="#84ad96" font-size="11.5">faits &amp; relations</text>
  <text x="390" y="392" text-anchor="middle" fill="#84ad96" font-size="11.5">extraits, requêtables</text>
  <text x="390" y="410" text-anchor="middle" fill="#6f9e82" font-size="10.5">entités · relations · pending</text>

  <!-- Chroma -->
  <g filter="url(#soft2)">
    <rect x="520" y="300" width="200" height="120" rx="14" fill="#0e2b2e" stroke="#1f9c93" stroke-width="1.6"/>
  </g>
  <text x="620" y="330" text-anchor="middle" fill="#54e0d0" font-size="17" font-weight="700">Chroma</text>
  <text x="620" y="352" text-anchor="middle" fill="#a3ddd7" font-size="12">sémantique vectorielle</text>
  <text x="620" y="374" text-anchor="middle" fill="#84bbb5" font-size="11.5">RAG hybride + rerank</text>
  <text x="620" y="392" text-anchor="middle" fill="#84bbb5" font-size="11.5">CRAG (RAG correctif)</text>
  <text x="620" y="410" text-anchor="middle" fill="#6fa39d" font-size="10.5">persistant + cycle de vie</text>

  <!-- SDM inert -->
  <g filter="url(#soft2)">
    <rect x="750" y="300" width="190" height="120" rx="14" fill="#191d27" stroke="#4a5468" stroke-width="1.6" stroke-dasharray="6 5"/>
  </g>
  <text x="845" y="330" text-anchor="middle" fill="#8b97ab" font-size="17" font-weight="700">SDM</text>
  <text x="845" y="352" text-anchor="middle" fill="#7c889c" font-size="12">Sparse Distributed Mem</text>
  <text x="845" y="376" text-anchor="middle" fill="#6a7488" font-size="11.5">inerte — en réévaluation</text>
  <text x="845" y="398" text-anchor="middle" fill="#5c6578" font-size="10.5">câblage causal insuffisant</text>

  <!-- arrows salience -> stages -->
  <path d="M 440 236 C 320 262 220 270 165 298" fill="none" stroke="#5b6b82" stroke-width="2" marker-end="url(#a2)"/>
  <path d="M 480 236 C 440 262 410 272 392 298" fill="none" stroke="#5b6b82" stroke-width="2" marker-end="url(#a2)"/>
  <path d="M 520 236 C 560 262 600 272 618 298" fill="none" stroke="#5b6b82" stroke-width="2" marker-end="url(#a2)"/>
  <path d="M 560 236 C 700 262 800 268 845 298" fill="none" stroke="#4a5468" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#a2)"/>
  <path d="M 500 152 L 500 182" fill="none" stroke="#5b6b82" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Consolidation / promotion arrow MHN -> Chroma -->
  <path d="M 160 420 C 160 500 400 512 560 470 C 590 462 605 448 616 424" fill="none" stroke="#8f5fd0" stroke-width="2.4" stroke-dasharray="2 0" marker-end="url(#a2p)"/>
  <g filter="url(#soft2)">
    <rect x="300" y="486" width="290" height="44" rx="10" fill="#221733" stroke="#8f5fd0" stroke-width="1.3"/>
  </g>
  <text x="445" y="512" text-anchor="middle" fill="#b28ee8" font-size="12" font-weight="600">Consolidation (micro-sleep) : épisodique → permanent</text>

  <!-- Retrieval fan-in to prompt -->
  <g filter="url(#soft2)">
    <rect x="360" y="576" width="280" height="52" rx="12" fill="#161b28" stroke="#3d4a66" stroke-width="1.4"/>
  </g>
  <text x="500" y="601" text-anchor="middle" fill="#cdd8e8" font-size="14" font-weight="600">Contexte assemblé → prompt</text>
  <text x="500" y="619" text-anchor="middle" fill="#8895ac" font-size="11">rappel ciblé depuis KG + MHN + Chroma</text>

  <path d="M 390 420 C 400 500 440 540 470 574" fill="none" stroke="#2fae5f" stroke-width="1.8" marker-end="url(#a2)" opacity="0.85"/>
  <path d="M 620 420 C 610 500 560 540 530 574" fill="none" stroke="#1f9c93" stroke-width="1.8" marker-end="url(#a2)" opacity="0.85"/>

  <!-- Life-cycle mini-legend for Chroma -->
  <g filter="url(#soft2)">
    <rect x="726" y="452" width="244" height="128" rx="12" fill="#12222430" stroke="#1f9c93" stroke-width="1.1"/>
  </g>
  <text x="742" y="474" fill="#54e0d0" font-size="12.5" font-weight="700">Cycle de vie Chroma (V5.9)</text>
  <text x="742" y="497" fill="#9fc4bf" font-size="11.5">• création → created_ts</text>
  <text x="742" y="517" fill="#9fc4bf" font-size="11.5">• rappel → protège de l'oubli</text>
  <text x="742" y="537" fill="#9fc4bf" font-size="11.5">• non consulté &gt; TTL → purge</text>
  <text x="742" y="557" fill="#9fc4bf" font-size="11.5">• consolidé → permanent</text>
  <text x="742" y="574" fill="#6fa39d" font-size="10">GC au deep-sleep · dry-run de sûreté</text>
</svg>
